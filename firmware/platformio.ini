; =============================================================
; openHop Modem (pymc_modem) — Serial-to-SX1262 bridge for pymc_core
; Supported boards share the same source tree; pick one env per build:
;   pio run -e heltec_v3      → Heltec WiFi LoRa 32 V3 (bare SX1262)
;   pio run -e heltec_v4      → Heltec WiFi LoRa 32 V4 (SX1262 + FEM)
;   pio run -e heltec_v42     → Heltec WiFi LoRa 32 V4.2 (GC1109 FEM)
;   pio run -e heltec_v43     → Heltec WiFi LoRa 32 V4.3 (KCT8103L LNA bypass)
;   pio run -e ikoka_stick    → XIAO ESP32-S3 + Ebyte E22P868M30S
;   pio run -e ethermesh_1w   → MeshSmith EtherMesh-1W (ESP32-P4 + Ethernet + E22P)
; =============================================================

[env]
framework = arduino
monitor_speed = 921600
upload_speed = 921600

lib_deps =
    jgromes/RadioLib@^7.1.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    bblanchon/ArduinoJson@^7.0.4

build_flags =
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; Default MeshCore radio params (host overrides via SET_CONFIG).
    ; All board-specific GPIOs live in firmware/include/boards/<name>.h
    ; — DO NOT add -DLORA_* here.
    -DDEFAULT_FREQ=869618000
    -DDEFAULT_BW=62500
    -DDEFAULT_SF=8
    -DDEFAULT_CR=8
    -DDEFAULT_POWER=22
    -DDEFAULT_SYNCWORD=0x12
    -DDEFAULT_PREAMBLE=16

[env:heltec_v3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
; OTA upload (after first flash over USB):
;   pio run -e heltec_v3 -t upload --upload-port heltec-<mac3>.local
; or plain HTTP:
;   curl -F firmware=@.pio/build/heltec_v3/firmware.bin http://heltec-<mac3>.local/update
; Board JSON pins default_8MB.csv (app0/app1/otadata) — OTA-ready.
;
; Heltec V3 has a CP2102 on UART0 — Serial.printf goes there, host sees
; /dev/cu.usbserial-* for binary traffic. Native USB-CDC stays enumerated
; (VID 0x303a) but unused. ARDUINO_USB_CDC_ON_BOOT=0 keeps that split.
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HELTEC_V3

[env:heltec_v4]
; Heltec WiFi LoRa 32 V4. PlatformIO does not include this board yet, so the
; repo provides firmware/boards/heltec_wifi_lora_32_V4.json plus the matching
; firmware/variants/heltec_wifi_lora_32_V4/pins_arduino.h from Heltec's guide.
; Native USB-CDC is enabled for first flash/debug; OTA after provisioning:
;   pio run -e heltec_v4 -t upload --upload-port heltec-v4-<mac3>.local
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V4
board_build.variants_dir = variants
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HELTEC_V4

[env:heltec_v42]
; Heltec WiFi LoRa 32 V4.2: same ESP32-S3/SX1262 pin map as heltec_v4, but
; dedicated GC1109 PA/FEM policy with CPS driven high for full PA mode.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V4
board_build.variants_dir = variants
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HELTEC_V42

[env:heltec_v43]
; Heltec WiFi LoRa 32 V4.3: same ESP32-S3/SX1262 pin map as heltec_v4, but
; dedicated KCT8103L PA/FEM policy with FEM RX LNA bypassed to improve noise
; floor while keeping the SX1262's boosted RX gain enabled.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_wifi_lora_32_V4
board_build.variants_dir = variants
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HELTEC_V43

[env:heltec_tracker_v2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = heltec_tracker_v2
; Heltec Wireless Tracker V2 (ESP32-S3 + SX1262 + KCT8103L PA/FEM).
; Local board JSON mirrors MeshCore's 8 MB ESP32-S3/QIO target, while
; LoRa/FEM GPIOs live in boards/heltec_tracker_v2.h.
;
; MeshCore's board definition uses ARDUINO_USB_MODE=0 and CDC on boot for
; the native USB path, so override the repo-wide USB_MODE=1 default here.
build_unflags =
    -DARDUINO_USB_MODE=1
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    adafruit/Adafruit BusIO@^1.16.0
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HELTEC_TRACKER_V2
build_src_filter =
    +<*>
    -<oled_display.cpp>

[env:ikoka_stick]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = seeed_xiao_esp32s3
; OTA upload after first USB flash:
;   pio run -e ikoka_stick -t upload --upload-port ikoka-<mac3>.local
; or HTTP:
;   curl -F firmware=@.pio/build/ikoka_stick/firmware.bin http://ikoka-<mac3>.local/update
;
; XIAO ESP32-S3 has no USB-to-UART chip — the only path to the host is
; the ESP32-S3's native USB-CDC peripheral. ARDUINO_USB_CDC_ON_BOOT=1
; redirects the Arduino `Serial` to USB-CDC so Serial.printf reaches
; /dev/cu.usbmodem* on the host.
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_IKOKA_STICK

[env:xiao_wio_sx1262]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = seeed_xiao_esp32s3
; Seeed XIAO ESP32-S3 + Wio-SX1262 expansion (bare SX1262, +22 dBm max).
; Wio-SX1262 connector on the underside of the XIAO routes:
;   SPI:  SCK=GPIO7  / MISO=GPIO8 / MOSI=GPIO9
;   Ctrl: NSS=GPIO41 / RST=GPIO42 / BUSY=GPIO40 / DIO1=GPIO39
;   RF switch: DIO2 (TX) + RXEN=GPIO38 (RX) — see boards/xiao_wio_sx1262.h
;
; XIAO has no UART bridge — Serial goes via the ESP32-S3's native USB-CDC
; peripheral straight to GPIO19/20, so CDC_ON_BOOT=1 like Ikoka and T3-S3.
; First flash is over the same USB cable; OTA after that:
;   pio run -e xiao_wio_sx1262 -t upload --upload-port xiao-wio-<mac3>.local
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_XIAO_WIO_SX1262

[env:photon_1w_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = seeed_xiao_esp32c6
; MeshSmith Photon 1W openHop modem: Seeed XIAO ESP32-C6 + Photon SX1262/E22P
; front end using the same XIAO physical pinout as the Photon nRF hardware.
; Native USB-CDC carries the openHop binary protocol; Wi-Fi/TCP and OTA remain
; available through the normal openHop provisioning flow.
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_PHOTON_1W_XIAO_ESP32C6

[env:rak3112_wismesh]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
; RAK3112 WisDuo module on a WisMesh carrier (datasheet ref:
; _incoming/WisDuo - RAK3112 ...). 16 MB QIO flash + 8 MB octal PSRAM
; baked into the module, but our firmware fits comfortably in the
; ESP32-S3's 320 kB SRAM, so we do NOT enable PSRAM here — the OPI
; PSRAM init was crashing the chip in a tight reset loop. Default DIO
; flash mode + 8 MB partition table is enough; the upper half of the
; module's flash sits unused.
; Native USB-CDC straight to ESP32-S3 GPIO19/20 (no UART bridge) →
; CDC_ON_BOOT=1 like Ikoka.
board_build.partitions = default_8MB.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_RAK3112_WISMESH

[env:esp32_p4_nano]
; WaveShare ESP32-P4-NANO (RISC-V dual-core HP, no native Wi-Fi/BT,
; built-in EMAC + IP101GRI Ethernet PHY, ESP32-C6-MINI-1 co-processor
; bridged over SDIO for Wi-Fi). Requires the pioarduino fork because
; vanilla platformio/espressif32 doesn't ship ESP32-P4 support yet —
; pin the URL to a known-good release.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-p4-evboard
; The board exposes two USB-C ports:
;   * "USB"  → ESP32-P4 native USB-OTG (GPIO24/25 pair) — used for
;     flash + debug. Enumerates as /dev/cu.usbmodem* on macOS.
;   * "UART" → CH343P USB-UART bridge to UART0 (GPIO37/38) — only
;     useful as a debug fallback. Enumerates as /dev/cu.wchusbserial*.
; CDC_ON_BOOT=1 redirects Arduino Serial to native USB-CDC so a single
; cable into the "USB" port covers both upload and Serial.printf.
board_build.partitions = default_16MB.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_ESP32_P4_NANO

[env:ethermesh_1w]
; MeshSmith EtherMesh-1W: Waveshare ESP32-P4-ETH + Ebyte E22P/SX1262
; 1 W radio. Ethernet-only openHop modem: the ESP32-P4-ETH has no Wi-Fi
; coprocessor, and the IP101GRI RMII PHY uses the same wiring as the
; ESP32-P4-Nano reference board.
;
; E22P pinout:
;   NSS=GPIO20, SCK=GPIO21, MOSI=GPIO22, MISO=GPIO23
;   RST=GPIO26, RF_EN=GPIO27, BUSY=GPIO32, DIO1=GPIO33
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-p4-evboard
board_build.partitions = default_16MB.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DBOARD_ETHERMESH_1W

[env:lilygo_t3s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board = lilygo-t3-s3
; LilyGO T-Lora T3-S3 v1.2 / v1.3 — bare SX1262, no PA, no E22 module.
; Confirmed from V1.3 schematic: USB-C goes straight to the ESP32-S3's
; native USB peripheral (D+/D- → GPIO 19/20), no CH340/CP2102 in the
; signal path. UART0 pins on this board are routed to the LoRa module's
; UART, NOT to the host — so Serial MUST go via native USB-CDC
; (CDC_ON_BOOT=1, baked into the lilygo-t3-s3 board variant).
; OTA upload:
;   pio run -e lilygo_t3s3 -t upload --upload-port lilygo-t3s3-<mac3>.local
build_flags =
    ${env.build_flags}
    -DBOARD_LILYGO_T3S3

[env:station_g2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
; B&Q Consulting Station G2 — ESP32-S3 WROOM-1 + SX1262 + PA/LNA.
board_build.partitions = default_16MB.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
upload_speed = 921600
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SH110X@^2.1.13
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_STATION_G2

[env:heltec_t114]
; Heltec Mesh Node T114 (HT-n5262) — nRF52840 + SX1262, no Wi-Fi.
; Custom board JSON (firmware/boards/heltec_t114.json) + variant
; (firmware/variants/Heltec_T114_Board/) with an identity
; nRF-GPIO ↔ Arduino-pin map. The Adafruit Feather variant that
; ships with the BSP only exposes ~35 pins and remaps them, which
; collides with the T114 wiring; the custom variant lets us use
; the raw nRF GPIO numbers in boards/heltec_t114.h directly.
;
; All ESP-IDF / Wi-Fi / Ethernet / OTA code paths are #ifdef'd out
; for nRF52 — protocol talks USB-CDC and the optional UART2
; (P0.09 RX / P0.10 TX). Adafruit_SSD1306 is dropped from lib_deps
; because the T114's display is an ST7789 TFT, not an OLED.
;
; Flashing:
;   * Double-click RST → device shows up as "HT-n5262" UF2 disk
;   * `pio run -e heltec_t114 -t upload` (uses adafruit-nrfutil)
;   * Or drag firmware.uf2 onto the disk
platform = nordicnrf52
board = heltec_t114
framework = arduino
board_build.variants_dir = variants
lib_deps =
    jgromes/RadioLib@^7.1.0
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    adafruit/Adafruit BusIO@^1.16.0
upload_protocol = nrfutil
; Adafruit nRF52 BSP defaults to C++14; bump to C++17 so the
; `inline const BoardConfig BOARD = {...}` definition in the
; board header compiles without a warning.
build_unflags = -std=gnu++11 -std=c++11 -std=gnu++14 -std=c++14
build_flags =
    -std=gnu++17
    -DCFG_DEBUG=0
    -DBOARD_HELTEC_T114
    ; Adafruit nRF52 BSP default RX buffer is 64 B — too small for
    ; the protocol UART when a 121-B TX_REQUEST collides with the
    ; T114's own outgoing RX_PACKET writes (the chip can't drain
    ; the RX ring fast enough between IRQs and bytes drop). 512 B
    ; gives ~4× max-frame headroom; ~2 KB extra RAM per Uart instance.
    -DSERIAL_BUFFER_SIZE=512
    ; Default radio params (host overrides via SET_CONFIG)
    -DDEFAULT_FREQ=869618000
    -DDEFAULT_BW=62500
    -DDEFAULT_SF=8
    -DDEFAULT_CR=8
    -DDEFAULT_POWER=14
    -DDEFAULT_SYNCWORD=0x12
    -DDEFAULT_PREAMBLE=16
build_src_filter =
    +<*>
    -<wifi_manager.cpp>
    -<ethernet_manager.cpp>
    -<tcp_server.cpp>
    -<ota_manager.cpp>
    -<config_portal.cpp>
    -<oled_display.cpp>

[env:xiao_nrf52_wio]
; Seeed XIAO nRF52840 + Wio-SX1262 Meshtastic Kit (SKU 102010710) —
; nRF52840 + bare SX1262, no Wi-Fi, no onboard display. USB-CDC
; transport only; XIAO has native USB on the nRF52 USB peripheral.
;
; Custom board JSON (firmware/boards/xiao_nrf52_wio.json) + variant
; (firmware/variants/XIAO_nRF52_Wio/) with an identity Arduino-pin
; ↔ raw-nRF-GPIO map (same scheme as Heltec T114). The Adafruit
; nRF52 BSP doesn't ship a XIAO variant out of the box.
;
; Flashing:
;   * Double-click RESET → device shows up as "XIAO-BOOT" UF2 disk
;     (Adafruit nRF52 bootloader / OTAFIX with S140 7.3.0)
;   * `pio run -e xiao_nrf52_wio -t upload` (uses adafruit-nrfutil)
;   * Or drag firmware.uf2 onto the UF2 disk
platform = nordicnrf52
board = xiao_nrf52_wio
framework = arduino
board_build.variants_dir = variants
board_build.ldscript = boards/nrf52840_s140_v7.ld
lib_deps =
    jgromes/RadioLib@^7.1.0
upload_protocol = nrfutil
; Adafruit nRF52 BSP defaults to C++14; bump to C++17 so the
; `inline const BoardConfig BOARD = {...}` definition in the
; board header compiles without a warning.
build_unflags = -std=gnu++11 -std=c++11 -std=gnu++14 -std=c++14
build_flags =
    -std=gnu++17
    -DCFG_DEBUG=0
    -DBOARD_XIAO_NRF52_WIO
    ; Headroom on the BSP UART RX buffer (same reasoning as T114).
    -DSERIAL_BUFFER_SIZE=512
    ; Default radio params (host overrides via SET_CONFIG)
    -DDEFAULT_FREQ=869618000
    -DDEFAULT_BW=62500
    -DDEFAULT_SF=8
    -DDEFAULT_CR=8
    -DDEFAULT_POWER=14
    -DDEFAULT_SYNCWORD=0x12
    -DDEFAULT_PREAMBLE=16
build_src_filter =
    +<*>
    -<wifi_manager.cpp>
    -<ethernet_manager.cpp>
    -<tcp_server.cpp>
    -<ota_manager.cpp>
    -<config_portal.cpp>
    -<oled_display.cpp>
    -<tft_display.cpp>

[env:rak4631_wismesh_eth]
; RAKwireless WisMesh Ethernet Gateway:
;   RAK4631 Core Module + RAK19007 Base + RAK13800 W5100S Ethernet
;   optional RAK19018 PoE.
;
; Flashing:
;   * Double-click RESET to enter the Adafruit nRF52 USB bootloader
;   * pio run -e rak4631_wismesh_eth -t upload
;
; Runtime:
;   * openHop TCP protocol on Ethernet/W5100S, default port 5055
;   * LAN-only HTTP management UI and /api/stats on port 80
;   * USB-CDC remains available for recovery/logs/protocol fallback
;   * no network firmware upload; use USB/DFU or protocol OTA
platform = nordicnrf52
board = rak4631_wismesh_eth
framework = arduino
board_build.variants_dir = variants
lib_deps =
    jgromes/RadioLib@^7.1.0
    https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip
upload_protocol = nrfutil
build_unflags = -std=gnu++11 -std=c++11 -std=gnu++14 -std=c++14
build_flags =
    -std=gnu++17
    -DCFG_DEBUG=0
    -DBOARD_RAK4631_WISMESH_ETH
    -DPYMC_ETHERNET_W5100S=1
    -DPYMC_ETH_TCP_PORT=5055
    -DPYMC_ETH_TOKEN=\"\"
    -DPYMC_ETH_HOSTNAME=\"pymc-rak4631-eth\"
    -DPYMC_ETH_USE_DHCP=1
    -DPYMC_ETH_DHCP_TIMEOUT_MS=5000
    -DPYMC_ETH_DHCP_RESPONSE_TIMEOUT_MS=1000
    -DPYMC_ETH_DHCP_RETRY_MS=30000
    -DPYMC_ETH_STATIC_FALLBACK_ON_DHCP_FAIL=0
    -DPYMC_ETH_ASSUME_UNKNOWN_LINK_UP=0
    -DPYMC_ETH_HARD_RESET_ON_BEGIN=0
    -DSERIAL_BUFFER_SIZE=512
    ; Default radio params (host overrides via SET_CONFIG)
    -DDEFAULT_FREQ=869618000
    -DDEFAULT_BW=62500
    -DDEFAULT_SF=8
    -DDEFAULT_CR=8
    -DDEFAULT_POWER=22
    -DDEFAULT_SYNCWORD=0x12
    -DDEFAULT_PREAMBLE=16
build_src_filter =
    +<*>
    -<wifi_manager.cpp>
    -<ethernet_manager.cpp>
    -<tcp_server.cpp>
    -<ota_manager.cpp>
    -<config_portal.cpp>
    -<oled_display.cpp>
    -<tft_display.cpp>
