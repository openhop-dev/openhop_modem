name: Publish Firmware Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to package and update
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: firmware-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  package-and-upload:
    name: Package firmware from release tag
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_TAG"
          fi
          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Release tag contains unsupported characters: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Package and validate tracked firmware
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          python3 firmware/tools/package_release_assets.py \
            --tag "$RELEASE_TAG" \
            --output-dir release-assets
          (cd release-assets && sha256sum -c *-SHA256SUMS.txt)

      - name: Confirm the GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - name: Upload firmware packages to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
